<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">

  <!-- Styles (load order matters: tokens → base → layout → components) -->
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">

  <!-- Google Sign-In SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ── Login screen ── -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-icon"><i class="ti ti-briefcase" aria-hidden="true"></i></div>
      <div class="login-title">Job Tracker</div>
      <div class="login-sub">Sign in with your Google account to continue.</div>
      <div id="gisBtn"></div>
    </div>
  </div>

  <!-- ── Main app (hidden until authenticated) ── -->
  <div class="container app-hidden" id="app">

    <!-- Topbar -->
    <div class="topbar">
      <div>
        <div class="brand-title">
          <span class="brand-icon"><i class="ti ti-briefcase" aria-hidden="true"></i></span>
          Job Tracker
        </div>
        <div class="brand-sub">Track all your job applications</div>
      </div>
      <div class="topbar-right">
        <div class="user-badge" id="userBadge"></div>
        <button class="btn-add" type="button" id="btnAdd">
          <i class="ti ti-plus" aria-hidden="true"></i>Add application
        </button>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats" id="statsBar"></div>

    <!-- Toolbar: search + filters -->
    <div class="toolbar">
      <div class="search-wrap">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input type="text" id="searchInput" placeholder="Search company, role, location...">
      </div>
      <div class="sel-wrap">
        <i class="ti ti-adjustments-horizontal sel-leading" aria-hidden="true"></i>
        <div class="dd" data-dd="filterStatus" data-placeholder="All statuses"></div>
      </div>
      <div class="sel-wrap">
        <i class="ti ti-map-pin sel-leading" aria-hidden="true"></i>
        <div class="dd" data-dd="filterLoc" data-placeholder="All locations"></div>
      </div>
      <div class="sel-wrap">
        <i class="ti ti-layout-list sel-leading" aria-hidden="true"></i>
        <div class="dd" data-dd="filterSource" data-placeholder="All sources"></div>
      </div>
    </div>

    <!-- Applications table -->
    <div class="tbl-card">
      <div class="tbl-wrap">
        <table>
          <colgroup>
            <col style="width:16%">
            <col style="width:22%">
            <col style="width:11%">
            <col style="width:6%">
            <col style="width:6%">
            <col style="width:9%">
            <col style="width:9%">
            <col style="width:9%">
            <col style="width:9%">
            <col style="width:64px">
          </colgroup>
          <thead>
            <tr>
              <th data-sort="company">Company <span id="s-company"></span></th>
              <th data-sort="role">Role <span id="s-role"></span></th>
              <th data-sort="status" class="th-center">Status <span id="s-status"></span></th>
              <th class="th-center">Interview 1</th>
              <th class="th-center">Interview 2</th>
              <th data-sort="applyDate" class="th-center">Apply date <span id="s-applyDate"></span></th>
              <th data-sort="location" class="th-center">Location <span id="s-location"></span></th>
              <th data-sort="foundOn" class="th-center">Found on <span id="s-foundOn"></span></th>
              <th data-sort="salary" class="th-center">Salary (THB) <span id="s-salary"></span></th>
              <th class="th-center">—</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="tbl-footer">
        <span class="tbl-count" id="tblCount"></span>
        <span class="hint">Click a column header to sort</span>
      </div>
    </div>

  </div><!-- /app -->

  <!-- ── Add / Edit modal ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h3 id="modalTitle">Add application</h3>
        <button class="modal-close" type="button" id="modalClose" aria-label="Close">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="fg fg-full">
            <label for="f_company">Company</label>
            <input id="f_company" type="text" placeholder="e.g. Google">
          </div>
          <div class="fg fg-full">
            <label for="f_role">Role / Position</label>
            <input id="f_role" type="text" placeholder="e.g. Network Engineer">
          </div>
          <div class="fg">
            <label>Location</label>
            <div class="dd" data-dd="f_location"></div>
          </div>
          <div class="fg">
            <label>Apply date</label>
            <button type="button" class="dd-toggle date-toggle" id="f_applyDate_btn">Select date</button>
            <input id="f_applyDate" type="hidden">
          </div>
          <div class="fg">
            <label>Found on</label>
            <div class="dd" data-dd="f_foundOn"></div>
          </div>
          <div class="fg">
            <label for="f_salary">Requested salary (THB)</label>
            <div class="num-input">
              <input id="f_salary" type="number" inputmode="numeric" min="0" step="1000" placeholder="e.g. 45000">
            </div>
          </div>
          <div class="fg fg-full">
            <label>Status</label>
            <div class="dd" data-dd="f_status"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" type="button" id="btnCancel">Cancel</button>
        <button class="btn-primary" type="button" id="btnSave">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
